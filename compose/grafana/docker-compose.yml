services:
  inf-grafana:
    image: grafana/grafana:latest
    container_name: inf-grafana
    restart: unless-stopped
    networks:
      - ch-net
      - dwh-net
    ports:
      - '33000:3000'
    volumes:
      - inf-grafana-data:/var/lib/grafana
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  inf-grafana-data:
    name: inf-grafana-data
    external: true
