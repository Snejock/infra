global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: [ 'localhost:9090' ]

  - job_name: 'node-exporter'
    static_configs:
      - targets: [ 'host.docker.internal:9100' ]
        labels:
          instance: 'odin'
      - targets: [ '192.168.1.15:9100' ]
        labels:
          instance: 'loki'

  - job_name: 'cadvisor'
    static_configs:
      - targets: [ 'inf-cadvisor:8080' ]
        labels:
          instance: 'odin'
      - targets: [ '192.168.1.15:8080' ]
        labels:
          instance: 'loki'
